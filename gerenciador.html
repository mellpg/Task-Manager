<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Gerenciador de Tarefas - Organize suas atividades diárias"
    />
    <meta name="author" content="Mel Pereira" />
    <title>Gerenciador de Tarefas | Mel Pereira</title>
    <link rel="icon" href="imagens/logo.jpg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="bootstrap-override.css" />

    <style>
      /* Correção específica para o botão no mobile */
      @media (max-width: 576px) {
        .tarefa-form .row {
          flex-direction: column;
          gap: 10px;
        }

        .tarefa-form .col-9,
        .tarefa-form .col-3 {
          width: 100%;
          flex: 0 0 100%;
          max-width: 100%;
        }

        .btn-add {
          width: 100% !important;
          white-space: nowrap;
        }
      }

      /* Para telas muito pequenas (abaixo de 400px) */
      @media (max-width: 400px) {
        .btn-add {
          white-space: normal;
          font-size: 0.85rem;
          padding: 10px;
        }

        .btn-add i {
          margin-right: 4px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top navbar-custom">
      <div class="container">
        <a class="navbar-brand logo" href="index.html">
          <img src="imagens/logo.jpg" alt="Logo" class="logo-img" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <i class="fas fa-bars text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="sobre_mim.html">Sobre mim</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="projeto.html">Projeto</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5 pt-5">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-12">
          <div class="card-gerenciador fade-slide-in">
            <div class="text-center mb-4">
              <i
                class="fas fa-list-check fa-3x mb-3"
                style="color: #00f2ff"
              ></i>
              <h1 class="display-5 fw-bold">Gerenciador de Tarefas</h1>
              <div class="divider-glow mx-auto my-3"></div>
            </div>

            <!-- CORREÇÃO: Formulário responsivo -->
            <div class="tarefa-form mb-4">
              <div class="row g-2">
                <div class="col-12 col-sm-9">
                  <input
                    type="text"
                    id="novaTarefa"
                    class="form-control form-tarefa"
                    placeholder="Digite uma tarefa..."
                  />
                </div>
                <div class="col-12 col-sm-3">
                  <button onclick="adicionarTarefa()" class="btn-add w-100">
                    <i class="fas fa-plus me-1"></i> Adicionar
                  </button>
                </div>
              </div>
            </div>

            <div id="listaTarefas" class="tarefas-lista"></div>

            <div class="text-center mt-4">
              <button onclick="limparTarefas()" class="btn-clear">
                <i class="fas fa-trash-alt me-2"></i>Limpar todas as tarefas
              </button>
            </div>

            <div class="text-center mt-4">
              <a href="index.html" class="btn-voltar">
                <i class="fas fa-arrow-left me-2"></i>Voltar à Página inicial
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer text-center mt-auto">
      <div class="container py-3">
        <p class="mb-0 small">© 2026 - Meu Portfólio | Mel Pereira</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
